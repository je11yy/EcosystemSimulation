services:
  db:
    image: postgres:16
    container_name: ecosim-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  simulation-service:
    build:
      context: ./simulation_service
      dockerfile: Dockerfile
    container_name: ecosim-simulation-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SIM_SERVICE_PORT}:8001"
    volumes:
      - ./simulation_service:/app
      - ./simulation_core:/app/simulation_core
    depends_on:
      db:
        condition: service_healthy

  api-server:
    build:
      context: ./api_server
      dockerfile: Dockerfile
    container_name: ecosim-api-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SIMULATION_SERVICE_BASE_URL: http://simulation-service:8001
    ports:
      - "${API_SERVER_PORT}:8000"
    volumes:
      - ./api_server:/app
      - ./simulation_core:/app/simulation_core
    depends_on:
      db:
        condition: service_healthy
      simulation-service:
        condition: service_started

  frontend:
    image: node:22-alpine
    container_name: ecosim-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api-server:
        condition: service_started

volumes:
  postgres_data:
  frontend_node_modules:
